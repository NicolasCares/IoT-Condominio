<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel De monitoramento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #eef5fb; 
            --card: #ffffff; 
            --text: #4a4a4a; 
            --accent: #2196F3; 
            --water-top: #4dabf7;
            --water-bottom: #1971c2;
        }

        body.dark-mode { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #e0e0e0; 
            --accent: #64b5f6;
            --water-top: #2196F3;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            transition: 0.3s;
        }

        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .theme-switch { cursor: pointer; font-size: 24px; }
        .logout-btn { 
            text-decoration: none; color: var(--text); 
            border: 1px solid var(--text); padding: 5px 15px; border-radius: 20px; font-size: 13px;
        }

        .card { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            width: 350px;
            display: flex;
            flex-direction: column;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .info-col { text-align: left; }
        .info-col label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
        .info-col span { font-size: 28px; font-weight: 700; }

        .capsula-outer {
            width: 90px;
            height: 220px;
            background: #f1f3f5;
            border-radius: 45px;
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .agua {
            width: 100%;
            position: absolute;
            bottom: 0;
            height: {{ nivel }}%;
            background: linear-gradient(180deg, var(--water-top) 0%, var(--water-bottom) 100%);
            transition: height 2s ease-in-out;
        }

        .agua::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 0;
            width: 200%;
            height: 20px;
            background: var(--water-top);
            border-radius: 40%;
            animation: move-onda 4s linear infinite;
            opacity: 0.6;
        }

        @keyframes move-onda {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .footer-info {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.05);
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        .status-badge {
            margin-top: 15px;
            padding: 8px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            text-align: center;
        }

        .critico { background: rgba(220, 53, 69, 0.1); color: #dc3545; }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="theme-switch" onclick="mudarTema()">
            <i id="theme-icon" class="fas fa-moon"></i>
        </div>
        <a href="{{ url_for('logout') }}" class="logout-btn">Sair</a>
    </div>

    <div class="card">
        <div class="status-container">
            <div class="info-col">
                <label>Nível do Líquido</label>
                <span>{{ nivel }}%</span>
                
                <label style="margin-top: 20px;">Profundidade</label>
                <span style="font-size: 22px;">{{ profundidade }}m</span>

                <label style="margin-top: 20px;">Status</label>
                <span style="font-size: 18px;">{% if nivel > 20 %}Normal{% else %}Baixo{% endif %}</span>
            </div>

            <div class="capsula-outer">
                <div class="agua"></div>
            </div>
        </div>

        <!-- Onde aparecem a data e a profundidade no rodapé -->
        <div class="footer-info">
            {{ data_hora }} &nbsp;&nbsp; {{ profundidade }}m
        </div>

        <div class="status-badge {% if nivel <= 20 %}critico{% endif %}">
            {% if nivel > 20 %}ESTÁVEL{% else %}ALERTA CRÍTICO{% endif %}
        </div>
    </div>

    <script>
        const icon = document.getElementById('theme-icon');
        function aplicar(t) {
            if(t === 'escuro') {
                document.body.classList.add('dark-mode');
                icon.className = 'fas fa-sun';
            } else {
                document.body.classList.remove('dark-mode');
                icon.className = 'fas fa-moon';
            }
        }
        aplicar(localStorage.getItem('tema'));
        function mudarTema() {
            const novo = document.body.classList.contains('dark-mode') ? 'claro' : 'escuro';
            localStorage.setItem('tema', novo);
            aplicar(novo);
        }

        // AUTO-REFRESH (30 SEGUNDOS)
        setTimeout(() => { window.location.reload(); }, 30000);
    </script>
</body>
</html>
