<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Hill IoT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --input-bg: #ffffff;
            --input-border: #dddddd;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --input-bg: #2d2d2d;
            --input-border: #444444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: all 0.3s ease;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 22px;
            color: var(--text-sub);
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            transition: filter 0.3s ease;
        }

        body.dark-mode .logo-img {
            filter: invert(1) brightness(1.5);
        }

        h2 { margin: 10px 0; font-size: 26px; }
        p { color: var(--text-sub); margin-bottom: 30px; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #007BFF;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error-msg {
            color: #ff4d4d;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="theme-switch" onclick="mudarTema()">
            <i id="theme-icon" class="fas fa-moon"></i>
        </div>

        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo The Hill" class="logo-img">
        </div>

        <h2>Acesso Restrito</h2>
        <p>Monitoramento do Reservatório</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Usuário" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Senha" required>
            </div>
            <button type="submit">Entrar no Sistema</button>
        </form>
    </div>

    <script>
        const icon = document.getElementById('theme-icon');

        function aplicarTema(tema) {
            if (tema === 'escuro') {
                document.body.classList.add('dark-mode');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                document.body.classList.remove('dark-mode');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // Inicializa
        aplicarTema(localStorage.getItem('tema'));

        function mudarTema() {
            const novoTema = document.body.classList.contains('dark-mode') ? 'claro' : 'escuro';
            localStorage.setItem('tema', novoTema);
            aplicarTema(novoTema);
        }
    </script>
</body>
</html>
